<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — NoteFlow</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="auth-container">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="auth-logo-icon">📝</div>
      <span>NoteFlow</span>
    </div>

    <h1>Welcome back</h1>
    <p>Sign in to access your notes</p>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="john@example.com" />
      <div class="error-msg" id="email-error"></div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password" />
      <div class="error-msg" id="password-error"></div>
    </div>

    <button class="btn-primary" id="login-btn" onclick="handleLogin()">
      Sign in
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:5000/api/v1';

  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show ' + type;
    setTimeout(() => { toast.className = 'toast'; }, 3000);
  }

  function showError(id, message) {
    const el = document.getElementById(id);
    el.textContent = message;
    el.style.display = 'block';
  }

  function clearErrors() {
    document.querySelectorAll('.error-msg').forEach(el => {
      el.textContent = '';
      el.style.display = 'none';
    });
  }

  async function handleLogin() {
    clearErrors();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    let valid = true;
    if (!email) { showError('email-error', 'Email is required'); valid = false; }
    if (!password) { showError('password-error', 'Password is required'); valid = false; }
    if (!valid) return;

    const btn = document.getElementById('login-btn');
    btn.textContent = 'Signing in...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.status === 'success') {
        localStorage.setItem('accessToken', data.data.accessToken);
        localStorage.setItem('refreshToken', data.data.refreshToken);
        localStorage.setItem('user', JSON.stringify({ id: data.data.id, name: data.data.name, email: data.data.email }));
        showToast('Welcome back!');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      } else {
        showToast(data.message || 'Login failed', 'error');
        btn.textContent = 'Sign in';
        btn.disabled = false;
      }

    } catch (err) {
      showToast('Server error. Make sure backend is running.', 'error');
      btn.textContent = 'Sign in';
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });

  if (localStorage.getItem('accessToken')) {
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
