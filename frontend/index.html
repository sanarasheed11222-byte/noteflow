<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoteFlow</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: var(--primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .logo span { font-size: 17px; font-weight: 700; }

    .user-menu {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; padding: 6px 10px;
      border-radius: 8px; transition: background 0.2s;
    }
    .user-menu:hover { background: var(--surface2); }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }
    .user-name { font-size: 13px; font-weight: 500; }

    .search-box { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .search-box input {
      background: var(--surface2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
    }

    .categories {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .cat-btn {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn.active, .cat-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .notes-list {
      flex: 1; overflow-y: auto;
      padding: 8px;
    }
    .notes-list::-webkit-scrollbar { width: 4px; }
    .notes-list::-webkit-scrollbar-track { background: transparent; }
    .notes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .note-item {
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 4px;
      transition: all 0.2s;
    }
    .note-item:hover { background: var(--surface2); }
    .note-item.active {
      background: var(--surface2);
      border-color: var(--primary);
    }
    .note-item-title {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .note-item-preview {
      font-size: 12px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 6px;
    }
    .note-item-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .note-item-date { font-size: 11px; color: var(--text-muted); }
    .note-cat-badge {
      font-size: 10px; padding: 2px 8px;
      border-radius: 10px; background: var(--primary);
      color: white; opacity: 0.8;
    }

    .new-note-btn {
      margin: 12px;
      padding: 12px;
      background: var(--primary);
      color: white;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .new-note-btn:hover { background: var(--primary-dark); }

    .empty-state {
      text-align: center; padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state div { font-size: 36px; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; }

    /* Editor */
    .editor {
      flex: 1; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }

    .editor-toolbar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }

    .editor-title {
      flex: 1; font-size: 18px; font-weight: 700;
      background: transparent; border: none;
      color: var(--text); outline: none;
      font-family: 'Inter', sans-serif;
    }

    .toolbar-btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-save {
      background: var(--primary);
      color: white;
    }
    .btn-save:hover { background: var(--primary-dark); }
    .btn-delete {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .btn-delete:hover { background: var(--danger); color: white; }

    .editor-meta {
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .editor-meta select {
      width: auto; padding: 6px 12px;
      font-size: 12px; border-radius: 8px;
    }
    .editor-date { font-size: 12px; color: var(--text-muted); }

    .tags-input-area {
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .tag {
      display: flex; align-items: center; gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
      font-size: 12px; color: var(--text-muted);
    }
    .tag-remove {
      cursor: pointer; color: var(--danger);
      font-size: 14px; line-height: 1;
    }
    .tag-input {
      background: transparent; border: none;
      font-size: 12px; color: var(--text);
      outline: none; width: 120px; padding: 3px 0;
    }

    .editor-body {
      flex: 1; padding: 24px;
      overflow-y: auto;
    }
    .editor-body textarea {
      width: 100%; height: 100%;
      background: transparent; border: none;
      color: var(--text); font-size: 15px;
      line-height: 1.8; resize: none; outline: none;
      font-family: 'Inter', sans-serif;
      min-height: 400px;
    }

    .welcome-screen {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      color: var(--text-muted);
    }
    .welcome-screen div { font-size: 60px; }
    .welcome-screen h2 { font-size: 22px; color: var(--text); }
    .welcome-screen p { font-size: 14px; }

    .saving-indicator {
      font-size: 12px; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
    }
    .saving-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--success);
    }

    @media (max-width: 768px) {
      .sidebar { width: 100%; position: absolute; z-index: 100; }
      .editor { margin-left: 0; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">📝</div>
        <span>NoteFlow</span>
      </div>
      <div class="user-menu" onclick="handleLogout()">
        <div class="avatar" id="user-avatar">U</div>
        <span class="user-name" id="user-name">User</span>
      </div>
    </div>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search notes..." oninput="handleSearch()" />
    </div>

    <div class="categories">
      <button class="cat-btn active" onclick="filterCategory('', this)">All</button>
      <button class="cat-btn" onclick="filterCategory('General', this)">General</button>
      <button class="cat-btn" onclick="filterCategory('Work', this)">Work</button>
      <button class="cat-btn" onclick="filterCategory('Personal', this)">Personal</button>
      <button class="cat-btn" onclick="filterCategory('Ideas', this)">Ideas</button>
    </div>

    <div class="notes-list" id="notes-list"></div>

    <button class="new-note-btn" onclick="createNewNote()">+ New note</button>
  </div>

  <!-- Editor -->
  <div class="editor" id="editor">
    <div class="welcome-screen" id="welcome-screen">
      <div>📝</div>
      <h2>Welcome to NoteFlow</h2>
      <p>Select a note or create a new one</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:5000/api/v1';
let notes = [];
let currentNote = null;
let saveTimeout = null;
let currentCategory = '';

// Auth check
const token = localStorage.getItem('accessToken');
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (!token) window.location.href = 'login.html';

// Set user info
document.getElementById('user-avatar').textContent = user.name ? user.name[0].toUpperCase() : 'U';
document.getElementById('user-name').textContent = user.name || 'User';

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast show ' + type;
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}

function formatDate(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = now - date;
  if (diff < 86400000) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (diff < 604800000) return date.toLocaleDateString([], { weekday: 'short' });
  return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

async function fetchNotes(search = '', category = '') {
  try {
    let url = `${API}/notes?`;
    if (search) url += `search=${encodeURIComponent(search)}&`;
    if (category) url += `category=${encodeURIComponent(category)}`;

    const res = await fetch(url, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    if (data.status === 'success') {
      notes = data.data;
      renderNotesList();
    }
  } catch (err) {
    showToast('Failed to load notes', 'error');
  }
}

function renderNotesList() {
  const list = document.getElementById('notes-list');
  if (notes.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div>🗒️</div>
        <p>No notes yet.<br/>Create your first note!</p>
      </div>`;
    return;
  }
  list.innerHTML = notes.map(note => `
    <div class="note-item ${currentNote && currentNote.id === note.id ? 'active' : ''}"
         onclick="openNote(${note.id})">
      <div class="note-item-title">${note.title}</div>
      <div class="note-item-preview">${note.content.substring(0, 60)}...</div>
      <div class="note-item-footer">
        <span class="note-item-date">${formatDate(note.updated_at)}</span>
        <span class="note-cat-badge">${note.category}</span>
      </div>
    </div>
  `).join('');
}

function openNote(id) {
  currentNote = notes.find(n => n.id === id);
  if (!currentNote) return;
  renderEditor();
  renderNotesList();
}

function renderEditor() {
  const editor = document.getElementById('editor');
  const tags = currentNote.tags || [];

  editor.innerHTML = `
    <div class="editor-toolbar">
      <input class="editor-title" id="note-title" value="${currentNote.title}"
             oninput="scheduleSave()" placeholder="Note title..." />
      <div class="saving-indicator" id="saving-indicator">
        <div class="saving-dot"></div> Saved
      </div>
      <button class="toolbar-btn btn-save" onclick="saveNote()">Save</button>
      <button class="toolbar-btn btn-delete" onclick="deleteNote(${currentNote.id})">Delete</button>
    </div>

    <div class="editor-meta">
      <span class="editor-date">Last edited: ${formatDate(currentNote.updated_at)}</span>
      <select id="note-category" onchange="scheduleSave()">
        <option ${currentNote.category === 'General' ? 'selected' : ''}>General</option>
        <option ${currentNote.category === 'Work' ? 'selected' : ''}>Work</option>
        <option ${currentNote.category === 'Personal' ? 'selected' : ''}>Personal</option>
        <option ${currentNote.category === 'Ideas' ? 'selected' : ''}>Ideas</option>
      </select>
    </div>

    <div class="tags-input-area" id="tags-area">
      ${tags.map(tag => `
        <span class="tag">
          #${tag}
          <span class="tag-remove" onclick="removeTag('${tag}')">×</span>
        </span>
      `).join('')}
      <input class="tag-input" id="tag-input" placeholder="Add tag..." 
             onkeydown="handleTagInput(event)" />
    </div>

    <div class="editor-body">
      <textarea id="note-content" oninput="scheduleSave()"
                placeholder="Start writing your note...">${currentNote.content}</textarea>
    </div>
  `;
}

function scheduleSave() {
  const indicator = document.getElementById('saving-indicator');
  if (indicator) indicator.innerHTML = '<div class="saving-dot" style="background:var(--text-muted)"></div> Saving...';
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveNote, 1500);
}

async function saveNote() {
  if (!currentNote) return;
  const title = document.getElementById('note-title').value.trim();
  const content = document.getElementById('note-content').value.trim();
  const category = document.getElementById('note-category').value;
  const tags = currentNote.tags || [];

  if (!title || !content) return;

  try {
    const res = await fetch(`${API}/notes/${currentNote.id}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({ title, content, category, tags })
    });
    const data = await res.json();
    if (data.status === 'success') {
      currentNote = data.data;
      const indicator = document.getElementById('saving-indicator');
      if (indicator) indicator.innerHTML = '<div class="saving-dot"></div> Saved';
      fetchNotes(document.getElementById('search-input').value, currentCategory);
    }
  } catch (err) {
    showToast('Failed to save note', 'error');
  }
}

async function createNewNote() {
  try {
    const res = await fetch(`${API}/notes`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({ title: 'Untitled note', content: 'Start writing...', category: 'General', tags: [] })
    });
    const data = await res.json();
    if (data.status === 'success') {
      await fetchNotes();
      openNote(data.data.id);
      showToast('New note created!');
    }
  } catch (err) {
    showToast('Failed to create note', 'error');
  }
}

async function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  try {
    const res = await fetch(`${API}/notes/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    if (data.status === 'success') {
      currentNote = null;
      document.getElementById('editor').innerHTML = `
        <div class="welcome-screen">
          <div>📝</div>
          <h2>Note deleted</h2>
          <p>Select a note or create a new one</p>
        </div>`;
      showToast('Note deleted');
      fetchNotes();
    }
  } catch (err) {
    showToast('Failed to delete note', 'error');
  }
}

function handleTagInput(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = document.getElementById('tag-input').value.trim().replace(',', '');
    if (val && !currentNote.tags.includes(val)) {
      currentNote.tags.push(val);
      renderEditor();
      scheduleSave();
    }
  }
}

function removeTag(tag) {
  currentNote.tags = currentNote.tags.filter(t => t !== tag);
  renderEditor();
  scheduleSave();
}

function handleSearch() {
  const search = document.getElementById('search-input').value;
  fetchNotes(search, currentCategory);
}

function filterCategory(category, btn) {
  currentCategory = category;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fetchNotes(document.getElementById('search-input').value, category);
}

function handleLogout() {
  if (confirm('Are you sure you want to logout?')) {
    localStorage.clear();
    window.location.href = 'login.html';
  }
}

// Load notes on start
fetchNotes();
</script>

</body>
</html>
